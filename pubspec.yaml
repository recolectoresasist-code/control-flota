name: cyreco_flota_control
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- MAPAS GEOGRÁFICOS ---
  flutter_map: any     # Versión estable moderna
  latlong2: any         # Versión compatible exacta

  # --- CONEXIÓN DE BASE DE DATOS (MIGRACIÓN A SUPABASE) ---
  supabase_flutter: ^2.6.0

  # --- PAQUETES EXTRA PARA FUNCIONES DE CYRECO ---
  intl: ^0.19.0
  image_picker: ^1.1.2
  pdf: ^3.10.7
  printing: ^5.11.1
  universal_html: ^2.3.0
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logoreco.PNG

flutter_launcher_icons:
 android: "launcher_icon"
 ios: true
 image_path: "assets/images/logoreco.PNG" # <-- TU IMAGEN ACTUAL
 min_sdk_android: 21 # Opcional, pero recomendado